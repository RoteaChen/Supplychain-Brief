name: Daily Supply Chain Briefing

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5   # ← 确认是 setup-python，不是 python-setup
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run briefing
        env:
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
        run: python briefing.py
