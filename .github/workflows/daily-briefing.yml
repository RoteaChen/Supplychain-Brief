name: Supply Chain Daily Briefing

on:
  schedule:
    - cron: '0 23 * * *'      # UTC 3:30 = 北京时间 11:30
  workflow_dispatch:            # 支持手动触发

permissions:
  contents: read

jobs:
  briefing:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dnspython beautifulsoup4 feedparser
      
      - name: Run briefing crawler
        env:
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
        run: python briefing_enhanced.py
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: briefing-logs-${{ github.run_id }}
          path: briefing_*.txt
          retention-days: 7
