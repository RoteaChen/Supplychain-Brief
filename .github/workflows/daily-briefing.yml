name: Supply Chain Daily Briefing

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      # 关键：先检查语法，防止中文引号等导致的 SyntaxError
      - name: Check Python syntax
        run: |
          echo "Checking syntax..."
          python -m py_compile briefing_enhanced.py && echo "SYNTAX OK" || (echo "SYNTAX ERROR" && exit 1)
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dnspython beautifulsoup4 feedparser || echo "Optional deps skipped"
      
      - name: Run crawler
        env:
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
        run: python briefing_enhanced.py
      
      - name: Upload output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: briefing-output-${{ github.run_id }}
          path: briefing_*.txt
          if-no-files-found: ignore
          retention-days: 7
